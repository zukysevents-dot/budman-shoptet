<svg xmlns="http://www.w3.org/2000/svg" width="44" height="50" viewBox="0 0 44 50">
  <defs>
    <linearGradient id="m" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2f5f8"/>
      <stop offset=".5" stop-color="#a7afb7"/>
      <stop offset="1" stop-color="#69727a"/>
    </linearGradient>
    <radialGradient id="r" cx=".4" cy=".3" r=".85">
      <stop offset="0" stop-color="#f9e1a0"/>
      <stop offset=".5" stop-color="#d3a53c"/>
      <stop offset="1" stop-color="#7e5d0e"/>
    </radialGradient>
  </defs>
  <!-- shaft -->
  <path d="M38 8 L16 39" stroke="url(#m)" stroke-width="5" stroke-linecap="round"/>
  <path d="M38 8 L16 39" stroke="#ffffff" stroke-opacity=".35" stroke-width="1.4" stroke-linecap="round"/>
  <!-- handle knob -->
  <circle cx="38.5" cy="7.5" r="4.4" fill="#cdd4da" stroke="#8b939b" stroke-width=".6"/>
  <!-- scoop / working tip -->
  <circle cx="15" cy="40" r="5.4" fill="url(#m)" stroke="#5f686f" stroke-width=".5"/>
  <!-- rosin glob clinging + forming drip -->
  <path d="M15 36.5 q5.6 4 2.9 10.6 q-3 5.6 -6.1 0 q-2.5 -6.6 3.2 -10.6 z" fill="url(#r)"/>
  <circle cx="13.2" cy="40" r="1.5" fill="#ffffff" fill-opacity=".7"/>
</svg>
