<!doctype html>
<html lang="cs">
<head><meta charset="utf-8"><title>Crop B</title>
<style>body{background:#222;color:#eee;font-family:system-ui;padding:20px}
.checker{display:inline-block;background-image:linear-gradient(45deg,#888 25%,transparent 25%),linear-gradient(-45deg,#888 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#888 75%),linear-gradient(-45deg,transparent 75%,#888 75%);background-size:20px 20px;background-position:0 0,0 10px,10px -10px,-10px 0;padding:10px}
canvas{display:block;max-height:300px;width:auto}</style></head>
<body>
<div id="status">Načítám logo…</div>
<div class="checker"><canvas id="out"></canvas></div>
<script>
(async () => {
  const s = document.getElementById('status');
  try {
    const img = new Image();
    img.src = '/assets/brand/budman-logo.png?' + Date.now();
    await img.decode();
    const W = img.naturalWidth, H = img.naturalHeight;
    const cropW = Math.round(W * 0.4);
    const c = document.createElement('canvas'); c.width = cropW; c.height = H;
    const cx = c.getContext('2d'); cx.drawImage(img, 0, 0, cropW, H, 0, 0, cropW, H);
    const d = cx.getImageData(0, 0, cropW, H).data;
    let minX = cropW, minY = H, maxX = 0, maxY = 0;
    for (let y = 0; y < H; y++) for (let x = 0; x < cropW; x++) { if (d[(y * cropW + x) * 4 + 3] > 15) { if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y > maxY) maxY = y; } }
    const pad = 10; minX = Math.max(0, minX - pad); minY = Math.max(0, minY - pad); maxX = Math.min(cropW - 1, maxX + pad); maxY = Math.min(H - 1, maxY + pad);
    const bw = maxX - minX + 1, bh = maxY - minY + 1;
    const scale = Math.min(1, 560 / bh);
    const out = document.getElementById('out'); out.width = Math.round(bw * scale); out.height = Math.round(bh * scale);
    out.getContext('2d').drawImage(c, minX, minY, bw, bh, 0, 0, out.width, out.height);
    const url = out.toDataURL('image/png');
    const r = await fetch('/save?path=assets/brand/budman-b.png', { method: 'POST', body: url });
    s.textContent = 'HOTOVO ' + out.width + '×' + out.height + ' · ' + (await r.text());
    window.__done = true;
  } catch (e) { s.textContent = 'CHYBA: ' + e.message; }
})();
</script>
</body></html>
